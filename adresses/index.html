  <style>
/* ============================================================
   BOURBON BONS PLANS — REVAMP STYLESHEET
   BourbonMédia · La Réunion
   ============================================================ */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Brand */
      --orange:             #E8692B;
      --orange-dark:        #C9541E;
      --orange-light:       #F28C55;
      --orange-xlight:      #FFA96A;
      --orange-glow:        rgba(232,105,43,.15);
      --orange-glow-md:     rgba(232,105,43,.25);
      --orange-glow-lg:     rgba(232,105,43,.40);
      /* Backgrounds */
      --night:              #1A1008;
      --night-mid:          #1E1309;
      --night-card:         #251B0D;
      --night-card-hover:   #2D2010;
      --night-raised:       #312213;
      --night-border:       rgba(255,255,255,.08);
      /* Borders */
      --border:             rgba(255,255,255,.07);
      --border-md:          rgba(255,255,255,.12);
      --border-orange:      rgba(232,105,43,.35);
      /* Text */
      --text:               #F5EBE0;
      --text-mid:           #C4A98A;
      --text-muted:         #8A7060;
      --text-faint:         #5A4535;
      --white:              #FFFFFF;
      /* Accents */
      --green:              #22C55E;
      --green-bg:           rgba(34,197,94,.08);
      --green-border:       rgba(34,197,94,.18);
      --green-text:         #6EE7A0;
      /* Radius */
      --radius-xs:          6px;
      --radius-sm:          10px;
      --radius:             16px;
      --radius-lg:          22px;
      --radius-pill:        100px;
      /* Layout */
      --sidebar-width:      340px;
      --header-height:      57px;
      /* Transitions */
      --t-fast:             0.15s ease;
      --t-base:             0.28s ease;
      --t-spring:           0.4s cubic-bezier(0.34,1.56,0.64,1);
      /* Glass */
      --glass-bg:           rgba(26,16,8,.86);
      --glass-border:       rgba(255,255,255,.08);
      --glass-blur:         blur(16px);
      --glass-blur-sm:      blur(10px);
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; overflow-x: hidden; }

    body {
      font-family: 'Instrument Sans', -apple-system, sans-serif;
      background: var(--night);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar        { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track  { background: var(--night-mid); border-radius: 10px; }
    ::-webkit-scrollbar-thumb  { background: var(--orange); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--orange-light); }
    * { scrollbar-width: thin; scrollbar-color: var(--orange) var(--night-mid); }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--header-height);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background var(--t-base);
    }
    .header-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 1.15rem; color: var(--white);
      text-decoration: none; letter-spacing: -.02em;
      transition: opacity var(--t-base);
    }
    .header-logo:hover { opacity: .85; }
    .header-logo span { color: var(--orange); }
    .header-count {
      font-size: .75rem; font-weight: 600; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
      letter-spacing: .01em;
    }
    .header-count .dot-live {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(34,197,94,.6);
      animation: pulse-dot 2.2s ease-in-out infinite;
    }
    .header-count strong { color: var(--orange); }
    .header-back {
      color: var(--text-muted); text-decoration: none;
      font-size: .85rem; font-weight: 500;
      display: flex; align-items: center; gap: 5px;
      transition: color var(--t-base);
    }
    .header-back:hover { color: var(--orange); }

    /* ── HERO ── */
    .hero {
      padding: calc(var(--header-height) + 34px) 24px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,105,43,.12) 0%, transparent 60%),
        radial-gradient(ellipse 45% 35% at 15% 90%, rgba(180,60,10,.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 85% 70%, rgba(232,140,60,.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
      mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,.4) 40%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,.4) 40%, transparent);
    }
    .hero-inner {
      position: relative; z-index: 1;
      max-width: 620px; margin: 0 auto;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--night-card); border: 1px solid var(--border-md);
      border-radius: var(--radius-pill); padding: 7px 18px;
      font-size: .78rem; font-weight: 700; color: var(--text-mid);
      margin-bottom: 18px; letter-spacing: .01em;
      animation: fade-in-up .6s ease both; animation-delay: .1s;
    }
    .hero-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(34,197,94,.6);
      animation: pulse-dot 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .hero h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(1.8rem, 4.5vw, 2.9rem);
      font-weight: 800; line-height: 1.12;
      letter-spacing: -.03em; color: var(--white);
      margin-bottom: 12px;
      animation: fade-in-up .6s ease both; animation-delay: .2s;
    }
    .hero h1 .highlight {
      background: linear-gradient(125deg, var(--orange) 0%, var(--orange-xlight) 45%, #FFC96A 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* Hero stats row */
    .hero-stats {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 26px;
      animation: fade-in-up .6s ease both; animation-delay: .32s;
    }
    .hero-stat {
      text-align: center; padding: 0 20px;
      animation: fade-in-up .6s ease both;
    }
    .hero-stat + .hero-stat { border-left: 1px solid var(--border); }
    .hero-stat:nth-child(1) { animation-delay: .38s; }
    .hero-stat:nth-child(2) { animation-delay: .46s; }
    .hero-stat:nth-child(3) { animation-delay: .54s; }
    .hero-stat-value {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: var(--orange); line-height: 1; letter-spacing: -.03em;
    }
    .hero-stat-label {
      font-size: .68rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em; margin-top: 3px;
    }

    /* ── SEARCH BAR ── */
    .search-bar {
      position: relative;
      display: flex; align-items: center;
      max-width: 480px; margin: 0 auto;
      animation: fade-in-up .6s ease both; animation-delay: .4s;
    }
    .search-bar-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 17px; height: 17px; color: var(--text-muted);
      pointer-events: none; transition: color var(--t-base);
    }
    .search-bar:focus-within .search-bar-icon { color: var(--orange); }
    .search-bar input {
      width: 100%;
      background: var(--night-card);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-pill);
      padding: 13px 20px 13px 46px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .9rem; color: var(--text);
      outline: none; -webkit-appearance: none;
      transition: border-color var(--t-base), box-shadow var(--t-base), background var(--t-base);
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-bar input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-glow), 0 4px 20px rgba(0,0,0,.3);
      background: var(--night-raised);
    }
    .search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--night-raised); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      font-size: .85rem; transition: all var(--t-fast); flex-shrink: 0;
    }
    .search-clear:hover { background: var(--orange); color: var(--white); border-color: var(--orange); }
    .search-clear.visible { display: flex; }

    /* ── MAIN CONTENT (sidebar + map) ── */
    .main-content {
      display: flex;
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 0 40px;
      min-height: calc(100vh - var(--header-height) - 220px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--night-card);
      border: 1px solid var(--border-md);
      border-radius: 30px;
      position: sticky;
      top: calc(var(--header-height) + 12px);
      height: calc(100vh - var(--header-height) - 24px);
      overflow: hidden;
      margin: 12px 0 12px 12px;
      box-shadow: 0 4px 32px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.04);
    }

    /* Sidebar filters — hidden (filters on map only) */
    .sidebar-filters { display: none; }

    /* Sidebar count */
    .sidebar-header {
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-count {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-muted);
    }
    .sidebar-count span {
      color: var(--orange); font-size: .82rem; font-weight: 800;
      letter-spacing: 0; text-transform: none;
    }

    /* Scroll shadow overlay */
    .sidebar-list-wrap {
      flex: 1; overflow: hidden; position: relative;
    }
    .sidebar-list-wrap::before, .sidebar-list-wrap::after {
      content: ''; position: absolute; left: 0; right: 0;
      height: 28px; pointer-events: none; z-index: 2;
    }
    .sidebar-list-wrap::before {
      top: 0;
      background: linear-gradient(to bottom, var(--night-card), transparent);
    }
    .sidebar-list-wrap::after {
      bottom: 0;
      background: linear-gradient(to top, var(--night-card), transparent);
    }

    .sidebar-list {
      height: 100%; overflow-y: auto;
      padding: 4px 10px 16px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 4px; opacity: .5; }

    /* ── BIZ CARD ── */
    .biz-card {
      position: relative;
      display: flex; flex-direction: column; gap: 4px;
      padding: 11px 14px 11px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      transition: all var(--t-base);
      overflow: visible;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
    }
    /* Left orange bar */
    .biz-card::before {
      content: '';
      position: absolute; left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 0;
      background: var(--orange);
      border-radius: 0 3px 3px 0;
      transition: height var(--t-spring), opacity var(--t-base);
      opacity: 0;
    }
    .biz-card:hover {
      background: rgba(255,255,255,.03);
      border-color: var(--border);
      transform: translateX(2px);
    }
    .biz-card:hover::before { height: 55%; opacity: .65; }
    .biz-card.active {
      background: rgba(232,105,43,.06);
      border-color: var(--border-orange);
      transform: translateX(2px);
      box-shadow: 0 2px 16px var(--orange-glow);
    }
    .biz-card.active::before { height: 70%; opacity: 1; }

    .biz-card-meta {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      min-width: 0;
    }
    .biz-card-cat {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted);
      transition: color var(--t-base);
      white-space: nowrap; flex-shrink: 0;
    }
    .biz-card:hover .biz-card-cat, .biz-card.active .biz-card-cat { color: var(--orange); }
    .biz-card-city {
      font-size: .7rem; color: var(--text-muted); font-weight: 500;
      display: flex; align-items: center; gap: 3px;
    }
    .biz-card-city svg { width: 10px; height: 10px; }
    .biz-card-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .88rem; font-weight: 700; color: var(--text);
      line-height: 1.3; transition: color var(--t-base);
      word-wrap: break-word; overflow-wrap: break-word;
      hyphens: auto; -webkit-hyphens: auto;
      min-width: 0;
    }
    .biz-card:hover .biz-card-name, .biz-card.active .biz-card-name { color: var(--white); }
    .biz-card-result {
      font-size: .73rem; color: var(--text-muted);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: color var(--t-base);
    }
    .biz-card:hover .biz-card-result, .biz-card.active .biz-card-result { color: var(--text-mid); }

    /* Card social links */
    .biz-card-socials {
      display: flex; gap: 6px; margin-top: 4px;
    }
    .biz-card-social {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .68rem; font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      transition: all var(--t-base);
      -webkit-tap-highlight-color: transparent;
    }
    .biz-card-social:hover {
      color: var(--white);
      border-color: var(--border-orange);
      background: var(--orange-glow);
      transform: translateY(-1px);
    }
    .biz-card-social svg { width: 12px; height: 12px; }
    .biz-card-social.ig { color: #E1306C; }
    .biz-card-social.ig:hover { border-color: rgba(225,48,108,.4); background: rgba(225,48,108,.08); }
    .biz-card-social.tt { color: var(--text-mid); }
    .biz-card-social.tt:hover { border-color: rgba(105,201,208,.4); background: rgba(105,201,208,.08); color: #69C9D0; }
    .biz-card-social.reel { color: var(--orange); }
    .biz-card-social.reel:hover { border-color: var(--border-orange); background: var(--orange-glow); }

    /* Views badge */
    .biz-card-views {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .65rem; font-weight: 700; color: var(--orange);
      background: var(--orange-glow);
      border: 1px solid rgba(232,105,43,.15);
      padding: 2px 8px; border-radius: var(--radius-pill);
      letter-spacing: .01em;
    }
    .biz-card-views svg { width: 10px; height: 10px; }

    /* "Nouveau" badge */
    .biz-card-new {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .6rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--green-text);
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      padding: 2px 7px; border-radius: var(--radius-pill);
    }

    /* Sort toggle */
    .sidebar-sort {
      display: flex; gap: 4px;
    }
    .sidebar-sort-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Instrument Sans', sans-serif;
      font-size: .65rem; font-weight: 600;
      padding: 4px 10px; border-radius: var(--radius-pill);
      cursor: pointer; transition: all var(--t-base);
      -webkit-tap-highlight-color: transparent;
    }
    .sidebar-sort-btn:hover { color: var(--text-mid); border-color: var(--border-md); }
    .sidebar-sort-btn.active {
      background: var(--orange); border-color: var(--orange);
      color: var(--white);
    }

    /* BBP video link in card */
    .biz-card-bbp {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .68rem; font-weight: 700;
      color: var(--orange);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-orange);
      background: var(--orange-glow);
      transition: all var(--t-base);
      -webkit-tap-highlight-color: transparent;
    }
    .biz-card-bbp:hover {
      background: var(--orange); color: var(--white);
      transform: translateY(-1px);
      box-shadow: 0 2px 12px var(--orange-glow-md);
    }
    .biz-card-bbp svg { width: 11px; height: 11px; }

    .sidebar-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; text-align: center; gap: 10px;
    }
    .sidebar-empty svg {
      width: 36px; height: 36px;
      margin: 0 auto; display: block; opacity: .25; color: var(--text-muted);
    }
    .sidebar-empty p { font-size: .82rem; color: var(--text-muted); line-height: 1.5; }

    /* Card stagger animation */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .biz-card { animation: cardIn .35s ease both; }

    /* ── MAP CONTAINER ── */
    .map-container {
      flex: 1;
      min-width: 0;
      position: sticky;
      top: calc(var(--header-height) + 12px);
      height: calc(100vh - var(--header-height) - 24px);
      border-radius: 30px;
      overflow: visible;
      margin: 12px 12px 12px 0;
      border: 1px solid var(--border-md);
      box-shadow: 0 4px 32px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.04);
    }
    .map-wrap {
      position: relative;
      width: 100%; height: 100%;
      border-radius: 30px;
      overflow: hidden;
    }
    #leafletMap {
      width: 100%; height: 100%;
      background: var(--night-card);
    }

    /* Map skeleton loader */
    .map-skeleton {
      position: absolute; inset: 0; z-index: 500;
      background: var(--night-card);
      border-radius: 30px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .5s ease;
    }
    .map-skeleton.loaded { opacity: 0; pointer-events: none; }
    .map-skeleton-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(232,105,43,.05) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
    }
    .map-skeleton-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .map-skeleton-inner svg { width: 34px; height: 34px; color: var(--orange); opacity: .25; }
    .map-skeleton-dots { display: flex; gap: 6px; }
    .map-skeleton-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--orange); opacity: .28;
      animation: skeleton-bounce 1.2s ease-in-out infinite;
    }
    .map-skeleton-dots span:nth-child(2) { animation-delay: .15s; }
    .map-skeleton-dots span:nth-child(3) { animation-delay: .3s; }

    /* Map category filters overlay */
    .map-filters-wrap {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 1000; max-width: calc(100% - 24px);
    }
    .map-filters {
      display: flex; gap: 4px; padding: 5px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur-sm);
      -webkit-backdrop-filter: var(--glass-blur-sm);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-pill);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .map-filters::-webkit-scrollbar { display: none; }
    .map-filter-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: var(--radius-pill);
      background: transparent; border: none;
      color: rgba(255,255,255,.55);
      font-family: 'Instrument Sans', sans-serif;
      font-size: .75rem; font-weight: 600;
      white-space: nowrap; cursor: pointer;
      transition: all var(--t-base); -webkit-tap-highlight-color: transparent;
    }
    .map-filter-btn:hover { color: var(--white); background: rgba(255,255,255,.06); }
    .map-filter-btn.active { background: var(--orange); color: var(--white); box-shadow: 0 2px 12px var(--orange-glow-md); }
    .map-filter-btn.active:hover { background: var(--orange-light); }

    /* Recenter button */
    .map-recenter {
      position: absolute; bottom: 56px; left: 12px;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur-sm);
      -webkit-backdrop-filter: var(--glass-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 8px 13px;
      color: var(--text-muted);
      font-family: 'Instrument Sans', sans-serif;
      font-size: .73rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all var(--t-base);
      opacity: 0; pointer-events: none;
      transform: translateY(4px);
    }
    .map-recenter.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .map-recenter:hover { color: var(--white); border-color: var(--border-orange); background: rgba(232,105,43,.1); }
    .map-recenter svg { width: 13px; height: 13px; }

    /* Toggle satellite / street */
    .map-toggle {
      position: absolute; bottom: 12px; right: 12px;
      z-index: 1000;
      display: flex; gap: 3px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur-sm);
      -webkit-backdrop-filter: var(--glass-blur-sm);
      border-radius: var(--radius-sm); padding: 4px;
      border: 1px solid var(--glass-border);
    }
    .map-toggle button {
      background: none; border: none;
      color: var(--text-muted);
      font-family: 'Instrument Sans', sans-serif;
      font-size: .72rem; font-weight: 600;
      padding: 5px 12px; border-radius: 7px;
      cursor: pointer; transition: all var(--t-base);
      -webkit-tap-highlight-color: transparent;
    }
    .map-toggle button.active { background: var(--orange); color: var(--white); box-shadow: 0 1px 8px var(--orange-glow); }
    .map-toggle button:hover:not(.active) { color: var(--text-mid); background: rgba(255,255,255,.05); }

    /* ── CUSTOM PIN ── */
    .custom-pin {
      position: relative;
      width: 40px; height: 52px;
      animation: pinBounce .55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pinBounce {
      0%   { transform: translateY(-28px); opacity: 0; }
      55%  { transform: translateY(5px);   opacity: 1; }
      75%  { transform: translateY(-3px); }
      90%  { transform: translateY(1px); }
      100% { transform: translateY(0); }
    }
    .custom-pin .pin-head {
      position: relative; z-index: 2;
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--orange-light), var(--orange));
      border: 3px solid var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 800; color: var(--white);
      font-family: 'Instrument Sans', sans-serif;
      box-shadow: 0 4px 18px rgba(232,105,43,.55), 0 2px 8px rgba(0,0,0,.4);
      transition: transform var(--t-spring), box-shadow var(--t-base);
    }
    .custom-pin:hover .pin-head {
      transform: scale(1.18);
      box-shadow: 0 6px 28px rgba(232,105,43,.70), 0 3px 12px rgba(0,0,0,.4);
    }
    .custom-pin .pin-tail {
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 11px solid var(--white);
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,.35));
    }
    .custom-pin .pin-pulse {
      position: absolute; top: 3px; left: 3px;
      width: 34px; height: 34px;
      border-radius: 50%; background: var(--orange);
      opacity: 0; animation: pinPulse 2.8s ease-out infinite;
      z-index: 0; pointer-events: none;
    }
    @keyframes pinPulse {
      0%   { transform: scale(1); opacity: .4; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    .pin-head.highlighted-head {
      background: #FFC107;
      box-shadow: 0 6px 28px rgba(255,193,7,.65);
      transform: scale(1.2);
    }

    /* ── LEAFLET POPUP OVERRIDE ── */
    .leaflet-popup-content-wrapper {
      background: var(--night-card) !important;
      border: 1px solid var(--border-md) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 8px 40px rgba(0,0,0,.55) !important;
      padding: 0 !important;
      color: var(--text) !important;
    }
    .leaflet-popup-content { margin: 0 !important; font-family: 'Instrument Sans', sans-serif !important; }
    .leaflet-popup-tip { background: var(--night-card) !important; }
    .leaflet-popup-close-button {
      color: var(--text-muted) !important;
      font-size: 1.1rem !important;
      top: 8px !important; right: 10px !important;
      transition: color var(--t-base);
    }
    .leaflet-popup-close-button:hover { color: var(--white) !important; }
    /* Zoom control */
    .leaflet-control-zoom a {
      background: var(--glass-bg) !important;
      border-color: var(--glass-border) !important;
      color: var(--text-mid) !important;
      backdrop-filter: var(--glass-blur-sm);
      font-weight: 600; transition: all var(--t-base);
    }
    .leaflet-control-zoom a:hover { background: var(--night-raised) !important; color: var(--white) !important; border-color: var(--border-orange) !important; }
    .leaflet-control-zoom-in  { border-radius: var(--radius-sm) var(--radius-sm) 0 0 !important; }
    .leaflet-control-zoom-out { border-radius: 0 0 var(--radius-sm) var(--radius-sm) !important; }
    /* Popup biz item */
    .popup-biz-item { transition: background var(--t-fast) !important; }
    .popup-biz-item:hover { background: var(--orange-glow) !important; }

    /* ── BUSINESS MODAL ── */
    .biz-modal-overlay {
      position: fixed; inset: 0;
      z-index: 2000;
      background: rgba(10,6,2,.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-base);
    }
    .biz-modal-overlay.open { opacity: 1; pointer-events: auto; }
    .biz-modal {
      background: var(--night-card);
      border: 1px solid var(--border-md);
      border-radius: var(--radius-lg);
      padding: 0;
      max-width: 460px; width: 100%;
      transform: translateY(40px) scale(.95);
      transition: transform .4s cubic-bezier(0.34,1.4,0.64,1);
      overflow: hidden;
      max-height: 92vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 60px rgba(0,0,0,.4);
    }
    .biz-modal-overlay.open .biz-modal { transform: translateY(0) scale(1); }
    .biz-modal-header {
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      padding: 24px 24px 22px;
      position: relative; overflow: hidden;
    }
    .biz-modal-header::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .biz-modal-close {
      position: absolute; top: 8px; right: 8px;
      width: 44px; height: 44px; min-width: 44px; min-height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
      color: var(--white); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--t-base), transform var(--t-spring);
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .biz-modal-close:hover { background: rgba(255,255,255,.3); transform: scale(1.1) rotate(90deg); }
    .biz-modal-cat {
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: rgba(255,255,255,.65); margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .biz-modal-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.45rem; font-weight: 800; color: var(--white);
      line-height: 1.2; letter-spacing: -.02em;
      position: relative; z-index: 1;
    }
    .biz-modal-city {
      margin-top: 8px;
      font-size: .83rem; color: rgba(255,255,255,.72);
      display: flex; align-items: center; gap: 5px;
      position: relative; z-index: 1;
    }
    .biz-modal-city svg { width: 13px; height: 13px; }
    .biz-modal-body { padding: 20px 24px 28px; }
    .biz-modal-result {
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: .86rem; color: var(--green-text);
      line-height: 1.55; margin-bottom: 18px;
    }
    .biz-modal-address {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: .83rem; color: var(--text-muted);
      margin-bottom: 18px; line-height: 1.5;
    }
    .biz-modal-address svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px; }
    .biz-modal-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .biz-modal-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text-mid);
      text-decoration: none;
      font-size: .8rem; font-weight: 600;
      font-family: 'Instrument Sans', sans-serif;
      transition: all var(--t-base);
    }
    .biz-modal-link:hover {
      border-color: var(--border-orange);
      background: var(--orange-glow);
      color: var(--white); transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
    }
    .biz-modal-link svg { width: 15px; height: 15px; }
    .biz-modal-link.instagram { color: #E1306C; }
    .biz-modal-link.instagram:hover { border-color: rgba(225,48,108,.4); background: rgba(225,48,108,.08); color: #E1306C; }
    .biz-modal-link.tiktok { color: var(--text-mid); }
    .biz-modal-link.tiktok:hover { border-color: rgba(105,201,208,.4); background: rgba(105,201,208,.08); color: #69C9D0; }
    .biz-modal-link.maps { color: #4285F4; }
    .biz-modal-link.maps:hover { border-color: rgba(66,133,244,.4); background: rgba(66,133,244,.08); color: #4285F4; }
    .biz-modal-section-title {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .biz-modal-embed {
      border-radius: var(--radius-sm); overflow: hidden;
      border: 1px solid var(--border); background: var(--night);
      margin-bottom: 18px;
    }
    .biz-modal-embed iframe { width: 100%; min-height: 380px; border: none; display: block; }
    /* Instagram Reels embed */
    .biz-modal-reels {
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--night);
      margin-bottom: 18px;
    }
    .biz-modal-reels iframe {
      width: 100%; min-height: 530px; border: none; display: block;
    }

    /* Modal CTA */
    .biz-modal-cta {
      margin-top: 6px;
      padding: 18px 0 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .biz-modal-cta p {
      font-size: .78rem; color: var(--text-muted);
      margin-bottom: 12px; font-weight: 500;
    }
    .biz-modal-cta-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .85rem; font-weight: 700;
      transition: all var(--t-base);
      box-shadow: 0 4px 18px var(--orange-glow-md);
    }
    .biz-modal-cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px var(--orange-glow-lg);
      background: linear-gradient(135deg, var(--orange-light), var(--orange));
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center; padding: 28px 24px;
      border-top: 1px solid var(--border);
      font-size: .75rem; color: var(--text-muted);
      display: flex; flex-direction: column; gap: 5px;
    }
    .footer-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: .9rem; color: var(--text-mid);
    }
    .footer-logo span { color: var(--orange); }
    .footer a { color: var(--text-muted); text-decoration: none; transition: color var(--t-base); }
    .footer a:hover { color: var(--orange); }

    /* ── ANIMATIONS ── */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .55; transform: scale(.75); }
    }
    @keyframes shimmer {
      0%   { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes skeleton-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .28; }
      40%            { transform: translateY(-5px); opacity: .65; }
    }
    /* Focus ring */
    :focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; border-radius: var(--radius-xs); }
    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

    /* ── RESPONSIVE — MOBILE ── */
    @media (max-width: 900px) {
      /* ── HERO — masqué sur mobile, carte fullscreen ── */
      .hero { display: none; }

      /* ── LAYOUT ── */
      .main-content {
        flex-direction: column; padding: 0; gap: 0;
        height: calc(100vh - var(--header-height));
        height: calc(100dvh - var(--header-height));
      }

      /* ── MAP — fullscreen ── */
      .map-container {
        order: 1; position: relative;
        flex: 1; min-height: 0;
        border-radius: 0; margin: 0;
        overflow: visible;
        border: none; box-shadow: none;
      }
      .map-wrap { border-radius: 0; overflow: hidden; height: 100%; }
      .map-skeleton { border-radius: 0; }
      #leafletMap { height: 100%; }

      /* Map filters — scrollable, smaller on mobile */
      .map-filters-wrap {
        top: 10px;
        max-width: calc(100% - 16px);
        left: 50%; transform: translateX(-50%);
      }
      .map-filters { padding: 4px; gap: 3px; }
      .map-filter-btn { font-size: .7rem; padding: 6px 10px; }

      /* Map controls repositioned for mobile */
      .map-recenter { bottom: 52px; left: 10px; font-size: .7rem; padding: 7px 12px; }
      .map-recenter svg { width: 14px; height: 14px; }
      .map-toggle { bottom: 10px; right: 10px; }
      .map-toggle button { font-size: .7rem; padding: 5px 11px; }

      /* ── SIDEBAR — masquée sur mobile ── */
      .sidebar { display: none; }

      /* ── FLOATING CTA — icon-only centered on mobile ── */
      .floating-cta {
        position: fixed !important;
        bottom: 20px !important;
        left: 50% !important;
        right: auto !important;
        transform: translateX(-50%) !important;
        width: 52px !important; height: 52px !important;
        max-width: none !important;
        border-radius: 50% !important;
        padding: 0 !important;
        justify-content: center;
        align-items: center;
        z-index: 1500;
      }
      .floating-cta svg { width: 22px !important; height: 22px !important; }
      .floating-cta .floating-cta-text { display: none; }

      /* ── MODAL — bottom sheet ── */
      .biz-modal-overlay { align-items: flex-end; padding: 0; }
      .biz-modal {
        max-width: 100%; width: 100%; max-height: 90vh;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        transform: translateY(100%) scale(1);
      }
      .biz-modal-overlay.open .biz-modal { transform: translateY(0) scale(1); }
      /* Handle bar */
      .biz-modal::before {
        content: ''; display: block;
        width: 40px; height: 5px; border-radius: 3px;
        background: rgba(255,255,255,.2);
        margin: 10px auto 6px;
        cursor: grab;
      }
      .biz-modal-header { padding: 16px 20px 18px; }
      .biz-modal-close {
        width: 44px; height: 44px;
        min-width: 44px; min-height: 44px;
        top: 8px; right: 8px;
        font-size: 1.3rem;
      }
      .biz-modal-name { font-size: 1.25rem; }
      .biz-modal-cat { font-size: .7rem; }
      .biz-modal-city { font-size: .85rem; }
      .biz-modal-body { padding: 18px 20px 24px; }
      .biz-modal-result { font-size: .84rem; padding: 12px 14px; }
      .biz-modal-address { font-size: .82rem; }
      .biz-modal-link { font-size: .8rem; padding: 10px 14px; }
      .biz-modal-embed iframe { min-height: 280px; }
      .biz-modal-reels iframe { min-height: 400px; }

      /* Modal CTA sticky — adjust margins for mobile body padding */
      .biz-modal-cta {
        padding: 14px 20px calc(env(safe-area-inset-bottom, 0px) + 18px) !important;
        margin: 0 -20px -24px !important;
      }
      .biz-modal-cta p { font-size: .78rem; }
      .biz-modal-cta-btn { font-size: .84rem; padding: 13px 22px; }

      /* ── MODAL NAV ARROWS ── */
      .biz-modal-nav {
        position: fixed;
        width: 40px; height: 40px;
        min-width: 44px; min-height: 44px;
        top: auto; bottom: 50%;
        transform: none;
        opacity: .85;
        z-index: 2020;
      }
      .biz-modal-nav.prev { left: 6px; }
      .biz-modal-nav.next { right: 6px; }

      /* ── FOOTER — masqué sur mobile ── */
      .footer { display: none; }

      /* ── LEAFLET ZOOM CONTROL ── */
      .leaflet-control-zoom { transform: scale(0.9); transform-origin: top right; }
    }

    /* ── SMALL SCREENS (iPhone SE, etc.) ── */
    @media (max-width: 480px) {
      .biz-modal-name { font-size: 1.15rem; }
      .biz-modal-header { padding: 14px 16px 16px; }
      .biz-modal-body { padding: 16px 16px 20px; }
      .biz-modal-cta {
        padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 16px) !important;
        margin: 0 -16px -20px !important;
      }
      .biz-modal-link { font-size: .78rem; padding: 9px 12px; }
      .biz-modal-links { gap: 6px; }
      .biz-modal-embed iframe { min-height: 240px; }
      .biz-modal-reels iframe { min-height: 360px; }

      .map-filter-btn { font-size: .65rem; padding: 5px 8px; }
    }

    /* ── VERY SMALL SCREENS (320px) ── */
    @media (max-width: 360px) {
      .biz-modal-name { font-size: 1.05rem; }
      .map-filter-btn { font-size: .62rem; padding: 4px 7px; }
    }

    /* ── BIZ CARD ACTIVE PRESS (micro-interaction) ── */
    .biz-card:active {
      transform: scale(0.98) !important;
      transition-duration: 0.08s;
    }

    /* ── FLOATING CTA (global, hors modale) ── */
    .floating-cta {
      position: fixed;
      z-index: 1000;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .88rem; font-weight: 700;
      box-shadow: 0 6px 32px var(--orange-glow-lg), 0 2px 12px rgba(0,0,0,.4);
      transition: opacity var(--t-base), box-shadow var(--t-base), background var(--t-base);
      animation: fade-in-up .6s ease both;
      animation-delay: 1.5s;
      white-space: nowrap;
    }
    .floating-cta:hover {

      if (skeleton) skeleton.classList.add('loaded');
    }, 400);
  });

  /* Recenter button */
  var recenterBtn = document.getElementById('mapRecenter');
  map.on('moveend zoomend', function () {
    var c = map.getCenter();
    var z = map.getZoom();
    var moved = Math.abs(c.lat - initialCenter[0]) > 0.03 ||
                Math.abs(c.lng - initialCenter[1]) > 0.03 ||
                Math.abs(z - initialZoom) > 0.6;
    recenterBtn.classList.toggle('visible', moved);

  recenterBtn.addEventListener('click', function () {
    map.flyTo(initialCenter, initialZoom, { duration: .8 });

  /* Satellite / Street toggle */

    btnSat.classList.remove('active');
  });

  /* Pin icon factory */
  function makePin(content, city) {
    return L.divIcon({
      className: '',
      iconSize:    [40, 52],
      iconAnchor:  [20, 52],
      popupAnchor: [0, -52],
      html: '<div class="custom-pin">' +
            '<div class="pin-pulse"></div>' +
            '<div class="pin-head">' + content + '</div>' +
            '<div class="pin-tail"></div>' +
            '</div>'
    });
  }

  /* Markers map: city → marker */
  var cityMarkers = {};

  function renderMapMarkers(filtered) {
    /* Remove all existing markers */
    Object.keys(cityMarkers).forEach(function (city) {
      map.removeLayer(cityMarkers[city].marker);
    });
    cityMarkers = {};

    /* Group filtered by city */
    var bizByCity = {};
    filtered.forEach(function (b) {
      if (!cityCoords[b.city]) return;
      if (!bizByCity[b.city]) bizByCity[b.city] = [];
      bizByCity[b.city].push(b);
    });

    /* Add markers */
    Object.keys(bizByCity).forEach(function (city) {
      var coords = cityCoords[city];
      var cityBiz = bizByCity[city];
      /* Show emoji for single-business city, count number otherwise */
      var pinContent = cityBiz.length === 1
        ? catInfo[cityBiz[0].cat].icon
        : String(cityBiz.length);

      var marker = L.marker(coords, { icon: makePin(pinContent, city) }).addTo(map);
      cityMarkers[city] = { marker: marker, bizList: cityBiz };

      if (cityBiz.length === 1) {
        marker.on('click', function () {
          map.flyTo(coords, 14, { duration: .8 });
          openBizModal(cityBiz[0], businesses.indexOf(cityBiz[0]));
        });
      } else {
        /* Multi-business popup — event delegation, no setTimeout */
        marker.on('click', function () {
          map.flyTo(coords, 13, { duration: .6 });

          var html = '<div style="font-family:\'Instrument Sans\',sans-serif;padding:12px 14px;min-width:190px;">';
          html += '<div style="font-weight:700;font-size:.82rem;margin-bottom:8px;color:#E8692B;">' +
                  city + ' <span style="color:#A08B78;font-weight:500;font-size:.75rem;">(' + cityBiz.length + ')</span></div>';
          cityBiz.forEach(function (b) {
            var idx = businesses.indexOf(b);
            html += '<div class="popup-biz-item" data-idx="' + idx + '" ' +
                    'style="padding:7px 8px;border-radius:8px;cursor:pointer;font-size:.82rem;' +
                    'font-weight:500;color:#FFFFFF;transition:background .18s;margin-bottom:2px;' +
                    'display:flex;align-items:center;gap:6px;">' +
                    '<span style="font-size:.85rem;">' + catInfo[b.cat].icon + '</span>' +
                    '<span>' + b.name + '</span>' +
                    '</div>';
          });
          html += '</div>';

          L.popup({ className: '', maxWidth: 260, closeButton: true })
            .setLatLng(coords)
            .setContent(html)
            .openOn(map);
        });
      }
    });
  }

  /* Event delegation on map container for popup items */
  document.getElementById('leafletMap').addEventListener('click', function (e) {
    var item = e.target.closest('.popup-biz-item');
    if (!item) return;
    var idx = parseInt(item.dataset.idx, 10);
    if (isNaN(idx) || !businesses[idx]) return;
    map.closePopup();
    openBizModal(businesses[idx], idx);
  });

  /* Highlight a pin by city */
  function highlightPin(city) {
    /* Remove previous highlights */
    Object.keys(cityMarkers).forEach(function (c) {
      var head = cityMarkers[c].marker.getElement();
      if (head) head.querySelector('.pin-head').classList.remove('highlighted-head');
    });
    if (city && cityMarkers[city]) {
      var el = cityMarkers[city].marker.getElement();
      if (el) el.querySelector('.pin-head').classList.add('highlighted-head');
    }
  }

  /* ════════════════════════════════════════════════════

  var sidebarFiltersEl = document.getElementById('sidebarFilters');
  var mapFiltersEl     = document.getElementById('mapFilters');

  function buildFilters() {
    /* Sidebar pills */
    var frag = document.createDocumentFragment();
    categories.forEach(function (cat) {
      var count = cat.id === 'all' ? businesses.length
        : businesses.filter(function (b) { return b.cat === cat.id; }).length;
      var btn = document.createElement('button');
      btn.className = 'cat-pill' + (cat.id === state.activeCat ? ' active' : '');
      btn.dataset.cat = cat.id;
      btn.innerHTML = cat.icon + ' ' + cat.label +
        ' <span class="pill-count">(' + count + ')</span>';
      frag.appendChild(btn);
    });
    sidebarFiltersEl.innerHTML = '';
    sidebarFiltersEl.appendChild(frag);

    /* Map filter buttons */
    if (mapFiltersEl) {
      var frag2 = document.createDocumentFragment();
      categories.forEach(function (cat) {
        var count = cat.id === 'all' ? businesses.length
          : businesses.filter(function (b) { return b.cat === cat.id; }).length;

        btn.className = 'map-filter-btn' + (cat.id === state.activeCat ? ' active' : '');

      state.activeCat = 'all';

  /* ════════════════════════════════════════════════════
     MODAL NAVIGATION (prev/next arrows + keyboard)
  ════════════════════════════════════════════════════ */
  var currentModalBiz = null;
  var currentModalIdx = -1;

  var origOpenBizModal = openBizModal;
  openBizModal = function (b, idx) {
    currentModalBiz = b;
    currentModalIdx = idx;
    origOpenBizModal(b, idx);
  };

  function navigateModal(dir) {
    var filtered = getFiltered();
    if (filtered.length === 0) return;
    /* Find current position in filtered list */
    var currentFilteredIdx = -1;
    for (var i = 0; i < filtered.length; i++) {
      if (businesses.indexOf(filtered[i]) === currentModalIdx) {
        currentFilteredIdx = i;
        break;
      }
    }
    var newIdx = currentFilteredIdx + dir;
    if (newIdx < 0) newIdx = filtered.length - 1;
    if (newIdx >= filtered.length) newIdx = 0;
    var newBiz = filtered[newIdx];
    var newOrigIdx = businesses.indexOf(newBiz);
    state.activeCardIdx = newOrigIdx;
    document.querySelectorAll('.biz-card').forEach(function (c) {
      c.classList.toggle('active', parseInt(c.dataset.idx, 10) === newOrigIdx);
    });
    openBizModal(newBiz, newOrigIdx);
  }

  document.getElementById('modalPrev').addEventListener('click', function (e) {
    e.stopPropagation();
    navigateModal(-1);
  });
  document.getElementById('modalNext').addEventListener('click', function (e) {
    e.stopPropagation();
    navigateModal(1);
  });

  /* Keyboard: left/right arrows when modal open */
  document.addEventListener('keydown', function (e) {
    if (!modalOverlay.classList.contains('open')) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); navigateModal(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); navigateModal(1); }
  });

  /* ════════════════════════════════════════════════════
     SWIPE-DOWN TO CLOSE MODAL (mobile)
  ════════════════════════════════════════════════════ */
  (function () {
    var modal = document.getElementById('bizModal');
    var startY = 0;
    var currentY = 0;
    var swiping = false;

    modal.addEventListener('touchstart', function (e) {
      /* Only trigger on the handle area (top 40px) */
      var rect = modal.getBoundingClientRect();
      var touchY = e.touches[0].clientY - rect.top;
      if (touchY > 40) return;
      if (modal.scrollTop > 0) return;
      startY = e.touches[0].clientY;
      swiping = true;
    }, { passive: true });

    modal.addEventListener('touchmove', function (e) {
      if (!swiping) return;
      currentY = e.touches[0].clientY;
      var diff = currentY - startY;
      if (diff > 0) {
        modal.style.transform = 'translateY(' + diff + 'px)';
      }
    }, { passive: true });

    modal.addEventListener('touchend', function () {
      if (!swiping) return;
      swiping = false;
      var diff = currentY - startY;
      if (diff > 100) {
        closeBizModal();
      }
      modal.style.transform = '';
    }, { passive: true });
  })();

  /* ════════════════════════════════════════════════════
     HIDE FLOATING CTA WHEN MODAL OPEN
  ════════════════════════════════════════════════════ */
  var floatingCta = document.getElementById('floatingCta');
  var origOpen = modalOverlay.classList.add.bind(modalOverlay.classList);
  /* Use MutationObserver to track modal open/close */
  new MutationObserver(function () {
    if (modalOverlay.classList.contains('open')) {
      floatingCta.style.opacity = '0';
      floatingCta.style.pointerEvents = 'none';
    } else {
      floatingCta.style.opacity = '';
      floatingCta.style.pointerEvents = '';
    }
  }).observe(modalOverlay, { attributes: true, attributeFilter: ['class'] });

  /* ════════════════════════════════════════════════════
     POSITION FLOATING CTA CENTERED ON LEAFLET MAP
  ════════════════════════════════════════════════════ */
  function positionFloatingCta() {
    var mapEl = document.getElementById('leafletMap');
    if (!mapEl || !floatingCta) return;
    var isMobileNow = window.innerWidth <= 900;

    /* On mobile: CSS handles position (fixed bottom). Only manage visibility. */
    if (isMobileNow) {
      floatingCta.style.left = '';
      floatingCta.style.bottom = '';
      floatingCta.style.right = '';
      if (!modalOverlay.classList.contains('open')) {
        floatingCta.style.opacity = '';
        floatingCta.style.pointerEvents = '';
      }
      return;
    }

    var rect = mapEl.getBoundingClientRect();
    var ctaRect = floatingCta.getBoundingClientRect();

    /* Center horizontally relative to map */
    var leftPos = rect.left + rect.width / 2 - ctaRect.width / 2;
    /* Clamp so it doesn't overflow viewport */
    leftPos = Math.max(16, Math.min(leftPos, window.innerWidth - ctaRect.width - 16));
    floatingCta.style.left = leftPos + 'px';
    floatingCta.style.right = '';

    var bottomOffset = window.innerHeight - rect.bottom + 24;
    /* Ensure minimum bottom distance */
    bottomOffset = Math.max(20, bottomOffset);
    floatingCta.style.bottom = bottomOffset + 'px';
  }
  positionFloatingCta();
  /* Re-position after CTA animation completes (animation-delay: 1.5s) */
  setTimeout(positionFloatingCta, 1800);
  window.addEventListener('resize', positionFloatingCta);
  window.addEventListener('scroll', positionFloatingCta);

  /* ════════════════════════════════════════════════════
     RENDER ALL
  ════════════════════════════════════════════════════ */
  function renderAll() {
    var filtered = getFiltered();
    buildSidebarCards(filtered);
    renderMapMarkers(filtered);
    updateHeaderCount(filtered);
    updateSidebarCount(filtered);
  }

  /* ════════════════════════════════════════════════════
     INIT
  ════════════════════════════════════════════════════ */
  buildFilters();
  renderAll();
  runHeroStats();

})();
</script>

</body>
</html>
