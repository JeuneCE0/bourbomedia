  <title>Nos Bons Plans — BourbonMédia</title>
  <meta name="description" content="Découvrez tous les bons plans de La Réunion mis en avant par Bourbon Bons Plans. Restaurants, boutiques, activités, hébergements et plus encore.">
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
  <link rel="apple-touch-icon" href="/favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #E8692B;
      --orange-dark: #C9541E;
      --orange-light: #F28C55;
      --orange-glow: rgba(232,105,43,.15);
      --brown: #3D2B1F;
      --brown-mid: #5C4033;
      --night: #1A1008;
      --night-mid: #251A0F;
      --night-card: #2F2117;
      --night-border: rgba(255,255,255,.08);
      --text-muted: #A08B78;
      --white: #FFFFFF;
      --green: #22C55E;
      --radius: 20px;
      --radius-sm: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--night);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(26,16,8,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--night-border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 1.15rem; color: var(--white);
      text-decoration: none;
    }
    .header-logo span { color: var(--orange); }
    .header-back {
      color: var(--text-muted); text-decoration: none;
      font-size: .88rem; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      transition: color .3s ease;
    }
    .header-back:hover { color: var(--orange); }

    /* ── HERO ── */
    .hero {
      padding: 120px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,105,43,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--night-card); border: 1px solid var(--night-border);
      border-radius: 100px; padding: 8px 18px;
      font-size: .82rem; font-weight: 600; color: var(--orange);
      margin-bottom: 20px;
    }
    .hero-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .hero h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800; line-height: 1.15;
      margin-bottom: 14px;
    }
    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--orange), #FFC107);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text-muted); font-size: 1.05rem;
      max-width: 520px; margin: 0 auto;
      line-height: 1.6;
    }

    /* ── ISLAND SVG DECORATION ── */
    .island-deco {
      position: absolute; top: 80px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 500px;
      opacity: .04;
      pointer-events: none;
    }

    /* ── SEARCH + FILTERS ── */
    .controls {
      max-width: 900px; margin: 0 auto 32px;
      padding: 0 24px;
    }
    .search-wrap {
      position: relative; margin-bottom: 20px;
    }
    .search-wrap svg {
      position: absolute; left: 18px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--text-muted);
    }
    .search-input {
      width: 100%;
      background: var(--night-card);
      border: 1px solid var(--night-border);
      border-radius: 100px;
      padding: 14px 20px 14px 48px;
      font-size: .95rem; color: var(--white);
      font-family: 'Instrument Sans', sans-serif;
      outline: none;
      transition: border-color .3s ease;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--orange); }

    .filters {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }
    .filter-pill {
      background: var(--night-card);
      border: 1px solid var(--night-border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: .85rem; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .3s ease;
      font-family: 'Instrument Sans', sans-serif;
      white-space: nowrap;
      display: flex; align-items: center; gap: 7px;
    }
    .filter-pill:hover {
      border-color: var(--orange);
      color: var(--white);
    }
    .filter-pill.active {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
      box-shadow: 0 4px 20px rgba(232,105,43,.3);
    }
    .filter-count {
      background: rgba(255,255,255,.15);
      border-radius: 100px;
      padding: 2px 8px;
      font-size: .75rem;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
    }
    .filter-pill.active .filter-count {
      background: rgba(255,255,255,.25);
    }

    /* ── RESULTS INFO ── */
    .results-info {
      max-width: 900px; margin: 0 auto 20px;
      padding: 0 24px;
      font-size: .88rem; color: var(--text-muted);
    }
    .results-info strong { color: var(--orange); }

    /* ── BUSINESS GRID ── */
    .grid {
      max-width: 900px; margin: 0 auto;
      padding: 0 24px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--night-card);
      border: 1px solid var(--night-border);
      border-radius: var(--radius);
      padding: 24px 20px;
      cursor: default;
      transition: all .35s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), #FFC107);
      opacity: 0;
      transition: opacity .3s ease;
    }
    .card:hover {
      border-color: rgba(232,105,43,.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(232,105,43,.1);
    }
    .card:hover::before { opacity: 1; }

    .card-cat {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--orange);
      margin-bottom: 12px;
    }
    .card-cat-icon {
      width: 18px; height: 18px;
      background: rgba(232,105,43,.12);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
    }

    .card-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-location {
      font-size: .82rem; color: var(--text-muted);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 5px;
    }
    .card-location svg {
      width: 13px; height: 13px; flex-shrink: 0;
    }

    .card-result {
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.15);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: .82rem;
      color: #6ee7a0;
      line-height: 1.5;
      margin-top: auto;
    }
    .card-result strong { color: var(--green); }

    .card-video-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px;
      font-size: .82rem; font-weight: 600;
      color: var(--orange);
      text-decoration: none;
      transition: all .3s ease;
    }
    .card-video-link:hover { color: var(--orange-light); gap: 9px; }
    .card-video-link svg { width: 14px; height: 14px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: .4;
    }
    .empty-state p {
      color: var(--text-muted);
      font-size: 1rem;
    }
    .empty-state .reset-link {
      color: var(--orange);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    /* ── CARD ANIMATIONS ── */
    .card {
      opacity: 0;
      transform: translateY(20px);
    }
    .card.visible {
      animation: cardIn .4s ease forwards;
    }
    .card.hiding {
      animation: cardOut .25s ease forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes cardOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(.95); }
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--night-border);
      font-size: .78rem; color: var(--text-muted);
    }
    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color .3s ease;
    }
    .footer a:hover { color: var(--orange); }

    /* ── ANIMATIONS ── */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .6; transform: scale(.8); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero { padding: 100px 20px 30px; }
      .grid { grid-template-columns: 1fr; padding: 0 16px 40px; }
      .controls { padding: 0 16px; }
      .filters { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
      .filter-pill { flex-shrink: 0; }
      .results-info { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="/" class="header-logo">Bourbon<span>Média</span></a>
    <a href="/" class="header-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Retour
    </a>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge"><span class="dot"></span> Mis à jour régulièrement</div>
    <h1>Les <span class="highlight">Bons Plans</span> de La Réunion</h1>
    <p>Tous les commerces mis en avant par Bourbon Bons Plans. Trouvez votre prochain coup de coeur.</p>
  </section>

  <!-- SEARCH + FILTERS -->
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un commerce, une ville...">
    </div>
    <div class="filters" id="filters">
      <!-- Generated by JS -->
    </div>
  </div>

  <div class="results-info" id="resultsInfo"></div>

  <!-- GRID -->
  <div class="grid" id="grid">
    <!-- Generated by JS -->
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Bourbon Média SAS — <a href="/mentions-legales">Mentions légales</a> · <a href="/politique-de-confidentialite">Confidentialité</a></p>
  </footer>

<script>
(function() {

  /* ── DATA ── */
  var businesses = [
    { name: "Sousou Access", cat: "boutique", city: "Saint-Denis", result: "+40 000€ de CA en 30 jours — +1 000 ventes", video: "https://www.instagram.com/sousou_access/" },
    { name: "Crazy Adventures", cat: "activite", city: "Saint-Leu", result: "+10 000€ de CA en 14 jours — +1M de vues en 45 jours", video: "https://www.instagram.com/crazy_adventures_reunion/" },
    { name: "Memphis Burger", cat: "restaurant", city: "Saint-Pierre", result: "80% des commandes du lendemain venaient de la vidéo", video: null },
    { name: "Jungle à Pat'", cat: "activite", city: "Saint-Denis", result: "+900 000 vues en 15 jours — rentabilisé en moins de 24h", video: "https://www.instagram.com/jungle_a_pat/" },
    { name: "La Crème de la Crêpe", cat: "restaurant", city: "Saint-Pierre", result: "+5 000 abonnés en 30 jours — complètement débordés", video: "https://www.instagram.com/lacremedelacrepe974/" },
    { name: "Le Mazéniène", cat: "restaurant", city: "Saint-Denis", result: "+500 000 vues sur Instagram — impact visible dès la 1ère semaine", video: "https://www.instagram.com/lemazeniene/" },
    { name: "Tropic Appart'Hôtel", cat: "hebergement", city: "Saint-Pierre", result: "+100 000 vues — période de vacances remplie", video: "https://www.instagram.com/tropicapparthotel/" },
    { name: "Fraises & Compagnie", cat: "gourmandise", city: "Plaine des Cafres", result: "Afflux de visiteurs après la vidéo", video: "https://www.instagram.com/fraises_et_compagnie974/" },
    { name: "Maison GAC", cat: "gourmandise", city: "Saint-Pierre", result: "Glacier artisan découvert par des milliers de Réunionnais", video: "https://www.instagram.com/maison_gac/" },
    { name: "Popeline Vintage", cat: "boutique", city: "Saint-Denis", result: "Boutique prise d'assaut après la vidéo BBP", video: "https://www.instagram.com/popeline.vintage/" },
    { name: "Pizza Cosy", cat: "restaurant", city: "Saint-Paul", result: "Commandes explosées après la mise en avant", video: null },
    { name: "Trapèze Studio", cat: "activite", city: "Saint-Denis", result: "Inscriptions en forte hausse", video: null },
    { name: "Le Madison", cat: "restaurant", city: "Saint-Denis", result: "Restaurant complet les jours suivant la vidéo", video: null },
    { name: "Poké Run", cat: "restaurant", city: "Saint-Pierre", result: "File d'attente dès le lendemain de la vidéo", video: null },
    { name: "Les Dalons", cat: "restaurant", city: "Saint-Gilles", result: "Visibilité locale décuplée", video: null },
    { name: "La Saint-Georges", cat: "restaurant", city: "Saint-Denis", result: "Découvert par une nouvelle clientèle", video: null },
    { name: "Kazaoké", cat: "activite", city: "Saint-Pierre", result: "Réservations en hausse immédiate", video: null },
    { name: "La Bonne Maison", cat: "gourmandise", city: "Le Tampon", result: "Afflux de curieux après la vidéo", video: null },
    { name: "Coliver", cat: "hebergement", city: "Saint-Paul", result: "Taux d'occupation en hausse", video: null },
    { name: "Alidou", cat: "boutique", city: "Saint-Denis", result: "Visibilité boostée sur les réseaux", video: null },
    { name: "La Baie des Anges", cat: "hebergement", city: "Saint-Gilles", result: "Réservations boostées en saison", video: null },
    { name: "Le Gourmand", cat: "restaurant", city: "Saint-André", result: "Notoriété locale renforcée", video: null },
    { name: "Le Paradoxe", cat: "restaurant", city: "Saint-Pierre", result: "Clientèle élargie grâce à BBP", video: null },
    { name: "Chez Kisbee", cat: "restaurant", city: "Saint-Denis", result: "Découvert par des milliers de personnes", video: null },
    { name: "The Donuts Island", cat: "gourmandise", city: "Saint-Pierre", result: "Ventes doublées la semaine suivante", video: null },
    { name: "Kaloubadia", cat: "boutique", city: "Saint-Paul", result: "Boutique mise en lumière", video: null },
    { name: "Terre de Running", cat: "boutique", city: "Saint-Denis", result: "Communauté engagée après la vidéo", video: null },
    { name: "Nonna Luisa", cat: "restaurant", city: "Saint-Paul", result: "Pizzeria prise d'assaut après la vidéo BBP", video: "https://www.instagram.com/nonnaluisa.re/" }
  ];

  var categories = [
    { id: "all", label: "Tous", icon: "⬡" },
    { id: "restaurant", label: "Restaurants", icon: "🍴" },
    { id: "boutique", label: "Boutiques", icon: "🛍" },
    { id: "activite", label: "Activités", icon: "🎯" },
    { id: "gourmandise", label: "Gourmandises", icon: "🍦" },
    { id: "hebergement", label: "Hébergements", icon: "🏠" }
  ];

  var catLabels = { restaurant: "Restaurant", boutique: "Boutique", activite: "Activité", gourmandise: "Gourmandise", hebergement: "Hébergement" };

  var activeFilter = "all";
  var searchQuery = "";

  /* ── RENDER FILTERS ── */
  var filtersEl = document.getElementById('filters');
  categories.forEach(function(cat) {
    var count = cat.id === 'all' ? businesses.length : businesses.filter(function(b) { return b.cat === cat.id; }).length;
    var pill = document.createElement('button');
    pill.className = 'filter-pill' + (cat.id === 'all' ? ' active' : '');
    pill.dataset.cat = cat.id;
    pill.innerHTML = cat.icon + ' ' + cat.label + ' <span class="filter-count">' + count + '</span>';
    pill.addEventListener('click', function() {
      activeFilter = cat.id;
      document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      renderCards();
    });
    filtersEl.appendChild(pill);
  });

  /* ── RENDER CARDS ── */
  var gridEl = document.getElementById('grid');
  var resultsEl = document.getElementById('resultsInfo');

  function getFiltered() {
    return businesses.filter(function(b) {
      var matchCat = activeFilter === 'all' || b.cat === activeFilter;
      var q = searchQuery.toLowerCase();
      var matchSearch = !q || b.name.toLowerCase().indexOf(q) !== -1 || b.city.toLowerCase().indexOf(q) !== -1 || catLabels[b.cat].toLowerCase().indexOf(q) !== -1;
      return matchCat && matchSearch;
    });
  }

  function renderCards() {
    var filtered = getFiltered();
    gridEl.innerHTML = '';

    resultsEl.innerHTML = '<strong>' + filtered.length + '</strong> commerce' + (filtered.length > 1 ? 's' : '') + (activeFilter !== 'all' ? ' dans "' + catLabels[activeFilter] + 's"' : '') + (searchQuery ? ' pour "' + searchQuery + '"' : '');

    if (filtered.length === 0) {
      gridEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>Aucun commerce trouvé.<br><span class="reset-link" id="resetBtn">Réinitialiser les filtres</span></p></div>';
      document.getElementById('resetBtn').addEventListener('click', function() {
        activeFilter = 'all';
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
        document.querySelector('.filter-pill[data-cat="all"]').classList.add('active');
        renderCards();
      });
      return;
    }

    filtered.forEach(function(b, i) {
      var card = document.createElement('div');
      card.className = 'card';

      var videoHtml = '';
      if (b.video) {
        videoHtml = '<a href="' + b.video + '" target="_blank" rel="noopener" class="card-video-link"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Voir la vidéo</a>';
      }

      card.innerHTML =
        '<div class="card-cat"><div class="card-cat-icon">' + categories.find(function(c) { return c.id === b.cat; }).icon + '</div> ' + catLabels[b.cat] + '</div>' +
        '<div class="card-name">' + b.name + '</div>' +
        '<div class="card-location"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ' + b.city + '</div>' +
        '<div class="card-result">' + b.result + '</div>' +
        videoHtml;

      gridEl.appendChild(card);

      setTimeout(function() {
        card.classList.add('visible');
      }, 40 * i);
    });
  }

  /* ── SEARCH ── */
  var searchInput = document.getElementById('searchInput');
  var searchTimeout;
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function() {
      searchQuery = searchInput.value.trim();
      renderCards();
    }, 200);
  });

  /* ── INIT ── */
  renderCards();

})();
</script>

</body>
</html>
